<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS Admin — Onboarding Modal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Simulated dashboard behind modal */
    .dashboard-bg {
      position: fixed;
      inset: 0;
      background: #f1f5f9;
      display: flex;
    }

    .sidebar-sim {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      padding: 20px 0;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 0 16px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      color: #1e293b;
    }

    .sidebar-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #0e7490, #0891b2);
      border-radius: 8px;
    }

    .sidebar-nav-label {
      padding: 0 16px 6px;
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .sidebar-item {
      padding: 8px 16px;
      font-size: 13px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-item.active {
      background: #e0f2fe;
      color: #0e7490;
      font-weight: 500;
    }

    .sidebar-dot {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: #cbd5e1;
      flex-shrink: 0;
    }

    .sidebar-item.active .sidebar-dot {
      background: #0e7490;
    }

    .main-sim {
      flex: 1;
      padding: 32px;
      filter: blur(1px);
      opacity: .5;
    }

    .sim-banner {
      background: linear-gradient(135deg, #0e7490, #0891b2);
      border-radius: 12px;
      height: 100px;
      margin-bottom: 20px;
    }

    .sim-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .sim-card {
      background: #fff;
      border-radius: 10px;
      height: 72px;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    /* Modal */
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 560px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.22), 0 4px 16px rgba(0,0,0,.1);
      position: relative;
    }

    /* Close button */
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,0,0,.35);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background .15s;
    }

    .modal-close:hover { background: rgba(0,0,0,.55); }

    .modal-close svg { color: #fff; }

    /* Video area */
    .modal-video {
      width: 100%;
      height: 280px;
      position: relative;
      background: #0f172a;
      overflow: hidden;
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: opacity .35s ease;
    }

    /* Gradient backgrounds per step */
    .step-bg-1 { background: linear-gradient(145deg, #0c4a6e 0%, #0e7490 50%, #0891b2 100%); }
    .step-bg-2 { background: linear-gradient(145deg, #134e4a 0%, #0f766e 50%, #14b8a6 100%); }
    .step-bg-3 { background: linear-gradient(145deg, #1e3a5f 0%, #1d4ed8 50%, #3b82f6 100%); }
    .step-bg-4 { background: linear-gradient(145deg, #3b1764 0%, #7c3aed 50%, #a855f7 100%); }
    .step-bg-5 { background: linear-gradient(145deg, #7c2d12 0%, #c2410c 50%, #f97316 100%); }

    .video-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.06) 50%, transparent 60%);
      background-size: 200% 100%;
      animation: shimmer 2.4s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .play-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .play-ring svg {
      color: #fff;
      margin-left: 3px;
    }

    .video-label {
      font-size: 12px;
      color: rgba(255,255,255,.6);
      letter-spacing: .04em;
      font-weight: 500;
    }

    /* Step icon floating */
    .step-icon-floating {
      position: absolute;
      bottom: 16px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,.3);
      border-radius: 20px;
      padding: 5px 12px 5px 5px;
      backdrop-filter: blur(6px);
    }

    .step-icon-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-icon-circle svg { color: #fff; }

    .step-icon-text {
      font-size: 12px;
      color: rgba(255,255,255,.85);
      font-weight: 500;
    }

    /* Modal body */
    .modal-body {
      padding: 24px 28px 20px;
    }

    .step-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e0f2fe;
      color: #0e7490;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .step-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0e7490;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .modal-desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.65;
    }

    /* Feature pills */
    .feature-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: #475569;
      font-weight: 500;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* Footer */
    .modal-footer {
      padding: 16px 28px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Dots pagination */
    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #cbd5e1;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: all .2s;
    }

    .dot.active {
      width: 20px;
      border-radius: 4px;
      background: #0e7490;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-skip {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #94a3b8;
      padding: 8px 4px;
      font-family: inherit;
      transition: color .15s;
    }

    .btn-skip:hover { color: #64748b; }

    .btn-prev {
      background: #f1f5f9;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #475569;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 500;
      transition: background .15s;
    }

    .btn-prev:hover { background: #e2e8f0; }

    .btn-next {
      background: #0e7490;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #fff;
      padding: 9px 22px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s, transform .1s;
    }

    .btn-next:hover { background: #0c6578; transform: translateY(-1px); }
    .btn-next:active { transform: translateY(0); }

    .btn-next.finish { background: #0e7490; }

    /* Transition animation */
    .modal-video .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    /* Reset trigger button (for demo) */
    .reset-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #0e7490;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(14,116,144,.35);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background .15s, transform .1s;
    }

    .reset-btn:hover { background: #0c6578; transform: scale(1.08); }
  </style>
</head>
<body>

<!-- Simulated dashboard background -->
<div class="dashboard-bg">
  <div class="sidebar-sim">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"></div>
      ATLAS
    </div>
    <div class="sidebar-nav-label">Navigation</div>
    <div class="sidebar-item active">
      <div class="sidebar-dot"></div> Dashboard
    </div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> Users</div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> Courses</div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> Job Roles</div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> CBL</div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> PALS Course</div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> Groups</div>
    <div class="sidebar-item"><div class="sidebar-dot"></div> Analytics</div>
  </div>
  <div class="main-sim">
    <div class="sim-banner"></div>
    <div class="sim-cards">
      <div class="sim-card"></div>
      <div class="sim-card"></div>
      <div class="sim-card"></div>
      <div class="sim-card"></div>
    </div>
  </div>
</div>

<!-- Overlay + Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">

    <!-- Close -->
    <button class="modal-close" id="closeBtn" title="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Video area -->
    <div class="modal-video" id="videoArea">
      <div class="video-shimmer"></div>
      <!-- Step-specific placeholder rendered by JS -->
    </div>

    <!-- Body -->
    <div class="modal-body">
      <div class="step-badge" id="stepBadge">
        <span class="step-badge-dot"></span>
        <span id="stepLabel">Step 1 of 5</span>
      </div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="feature-pills" id="featurePills"></div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <div class="dots" id="dotsContainer"></div>
      <div class="btn-group">
        <button class="btn-skip" id="skipBtn">Maybe later</button>
        <button class="btn-prev" id="prevBtn" style="display:none">Back</button>
        <button class="btn-next" id="nextBtn">
          <span id="nextLabel">Next</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<!-- Re-open button (shown after dismiss) -->
<button class="reset-btn" id="resetBtn" onclick="openModal()" title="Show onboarding guide">?</button>

<script>
  const steps = [
    {
      bg: 'step-bg-1',
      icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
      iconLabel: 'Admin Dashboard',
      title: 'Welcome to ATLAS Admin',
      desc: 'You now have full control over your organization\'s learning. From here, you can manage your team, build training content, run assessments, and track progress — all in one place.',
      pills: []
    },
    {
      bg: 'step-bg-2',
      icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
      iconLabel: 'Team Setup',
      title: 'Start with your people',
      desc: 'Invite team members, assign job roles, and organize them into groups. Role assignments ensure each learner sees training content that\'s relevant to their position.',
      pills: [
        { label: 'Users', color: '#14b8a6' },
        { label: 'Job Roles', color: '#14b8a6' },
        { label: 'Groups', color: '#14b8a6' },
      ]
    },
    {
      bg: 'step-bg-3',
      icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
      iconLabel: 'Content Building',
      title: 'Turn knowledge into courses',
      desc: 'Add articles to your Knowledge Base, then let AI generate courses and PALS learning paths automatically — or build them manually from scratch.',
      pills: [
        { label: 'Knowledge Base', color: '#3b82f6' },
        { label: 'Courses', color: '#3b82f6' },
        { label: 'PALS Course', color: '#3b82f6' },
      ]
    },
    {
      bg: 'step-bg-4',
      icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
      iconLabel: 'Practice & Assess',
      title: 'Put skills to the test',
      desc: 'CBL lets your team practice real workplace scenarios through AI-powered role-play conversations. Pair it with assessments and a question bank to measure what\'s actually been learned.',
      pills: [
        { label: 'CBL', color: '#a855f7' },
        { label: 'Assessments', color: '#a855f7' },
        { label: 'Question Bank', color: '#a855f7' },
        { label: 'Classes', color: '#a855f7' },
      ]
    },
    {
      bg: 'step-bg-5',
      icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
      iconLabel: 'Analytics',
      title: 'Track what matters',
      desc: 'Monitor course completion, engagement, and assessment scores in Learning Analytics. Dive deeper into team dynamics and training effectiveness with People Insights.',
      pills: [
        { label: 'Learning Analytics', color: '#f97316' },
        { label: 'People Insights', color: '#f97316' },
        { label: 'Data Overview', color: '#f97316' },
      ]
    },
  ];

  let current = 0;

  function render() {
    const step = steps[current];
    const total = steps.length;

    // Video area
    const videoArea = document.getElementById('videoArea');
    videoArea.className = `modal-video ${step.bg}`;
    videoArea.innerHTML = `
      <div class="video-shimmer"></div>
      <div class="video-placeholder">
        <div class="play-ring">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <span class="video-label">Video placeholder — replace with actual video</span>
      </div>
      <div class="step-icon-floating">
        <div class="step-icon-circle">${step.icon}</div>
        <span class="step-icon-text">${step.iconLabel}</span>
      </div>
    `;

    // Badge
    document.getElementById('stepLabel').textContent = `Step ${current + 1} of ${total}`;

    // Content
    document.getElementById('modalTitle').textContent = step.title;
    document.getElementById('modalDesc').textContent = step.desc;

    // Pills
    const pillsEl = document.getElementById('featurePills');
    pillsEl.innerHTML = step.pills.map(p => `
      <div class="pill">
        <span class="pill-dot" style="background:${p.color}"></span>
        ${p.label}
      </div>
    `).join('');

    // Dots
    const dotsEl = document.getElementById('dotsContainer');
    dotsEl.innerHTML = steps.map((_, i) => `
      <button class="dot ${i === current ? 'active' : ''}" onclick="goTo(${i})"></button>
    `).join('');

    // Buttons
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const nextLabel = document.getElementById('nextLabel');

    prevBtn.style.display = current > 0 ? 'block' : 'none';

    if (current === total - 1) {
      nextLabel.textContent = 'Done';
      nextBtn.classList.add('finish');
    } else {
      nextLabel.textContent = 'Next';
      nextBtn.classList.remove('finish');
    }
  }

  function goTo(index) {
    current = index;
    render();
  }

  function closeModal() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'flex';
  }

  function openModal() {
    current = 0;
    render();
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('resetBtn').style.display = 'none';
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (current < steps.length - 1) {
      current++;
      render();
    } else {
      closeModal();
    }
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (current > 0) {
      current--;
      render();
    }
  });

  document.getElementById('skipBtn').addEventListener('click', closeModal);
  document.getElementById('closeBtn').addEventListener('click', closeModal);

  // Close on backdrop click
  document.getElementById('overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  // Init
  render();
</script>
</body>
</html>
