<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC SmartPrep — Leaderboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F6F9;
      color: #1A2340;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* NAVBAR */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #E8EDF3;
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .navbar-logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 15px; color: #1A2340; text-decoration: none;
    }
    .logo-icon {
      width: 38px; height: 38px; background: #17B1EF; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;
    }
    .navbar-nav { display: flex; gap: 28px; list-style: none; }
    .navbar-nav a {
      text-decoration: none; font-size: 14px;
      color: #6B7A99; font-weight: 500; padding-bottom: 4px;
    }
    .navbar-nav a.active { color: #17B1EF; border-bottom: 2px solid #17B1EF; }
    .navbar-right { display: flex; align-items: center; gap: 16px; }
    .credit-badge {
      background: #FFF8E6; border: 1px solid #FFD966;
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; font-weight: 600; color: #B8860B;
      display: flex; align-items: center; gap: 6px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #E0E7EF; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }

    /* PAGE */
    .page { max-width: 820px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 24px; }

    /* TABLE */
    .lb-table {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .lb-header {
      display: grid; grid-template-columns: 80px 1fr 160px 160px;
      padding: 14px 24px; border-bottom: 1px solid #F0F4F8;
      font-size: 12px; font-weight: 700; color: #A0AEBE;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .lb-header .col-pts {
      display: flex; align-items: center; gap: 5px; justify-content: flex-end;
    }
    .lb-header .col-streak { text-align: center; }
    .info-icon {
      width: 15px; height: 15px; border-radius: 50%;
      background: #E0E7EF; color: #6B7A99;
      font-size: 9px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    .lb-row {
      display: grid; grid-template-columns: 80px 1fr 160px 160px;
      padding: 14px 24px; align-items: center;
      border-bottom: 1px solid #F8F9FB;
      transition: background 0.15s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: #FAFBFD; }
    .lb-row.mine { background: #F0FAFF; }

    /* rank badge */
    .rank-badge {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
    }
    .rank-badge.gold   { background: #FF8C00; color: #fff; }
    .rank-badge.silver { background: #6B7A99; color: #fff; }
    .rank-badge.bronze { background: #17B1EF; color: #fff; }
    .rank-badge.plain  { background: #F0F4F8; color: #6B7A99; }

    /* user info */
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #E0E7EF; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; }

    /* streak */
    .col-streak { text-align: center; }
    .streak-val {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 600; color: #F0B429;
    }

    /* points */
    .col-pts { text-align: right; }
    .pts-val {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 600; color: #17B1EF;
    }

    /* pagination */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; margin-top: 20px;
    }
    .page-btn {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid #E8EDF3; background: #fff; color: #6B7A99;
      transition: all 0.15s;
    }
    .page-btn.active { background: #17B1EF; color: #fff; border-color: #17B1EF; }
    .page-btn:hover:not(.active) { background: #F7FBFF; }
    .page-btn.arrow { width: auto; padding: 0 12px; font-size: 12px; }

    /* YOUR RANKING — sticky bottom */
    .my-ranking {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 2px solid #E8EDF3;
      padding: 0 calc(50% - 410px + 24px);
      z-index: 20;
    }
    .my-ranking-inner {
      max-width: 820px; margin: 0 auto; padding: 0 24px;
    }
    .my-ranking-label {
      font-size: 11px; font-weight: 700; color: #A0AEBE;
      text-transform: uppercase; letter-spacing: 0.4px;
      padding-top: 10px; margin-bottom: 6px;
    }
    .my-ranking-row {
      display: grid; grid-template-columns: 80px 1fr 160px 160px;
      padding: 10px 0 14px; align-items: center;
    }

    /* ── SPOTLIGHT TOUR ── */
    .spotlight-hole {
      position: fixed; border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(15,23,42,0.75);
      z-index: 101; pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .spotlight-tooltip {
      position: fixed; background: #fff; border-radius: 16px;
      padding: 20px 24px; width: 310px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      z-index: 102; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .tooltip-step {
      font-size: 11px; font-weight: 700; color: #17B1EF;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .tooltip-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #1A2340; }
    .tooltip-body { font-size: 13px; color: #6B7A99; line-height: 1.6; margin-bottom: 16px; }
    .tooltip-actions { display: flex; justify-content: space-between; align-items: center; }
    .tt-dots { display: flex; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #D1D9E6; }
    .dot.active { background: #17B1EF; width: 18px; border-radius: 3px; }
    .tooltip-btns { display: flex; gap: 8px; }
    .btn-tt-skip {
      padding: 8px 14px; background: none; border: 1.5px solid #E0E7EF;
      border-radius: 8px; font-size: 13px; font-weight: 600; color: #6B7A99; cursor: pointer;
    }
    .btn-tt-next {
      padding: 8px 18px; background: #17B1EF; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer;
    }
    .guide-fab {
      position: fixed; bottom: 88px; right: 28px;
      width: 52px; height: 52px; border-radius: 50%;
      background: #17B1EF; color: #fff; border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(23,177,239,0.45);
      font-size: 22px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      z-index: 50; transition: transform 0.2s;
    }
    .guide-fab:hover { transform: scale(1.08); }
    .guide-fab-label {
      position: fixed; bottom: 94px; right: 92px;
      background: #1A2340; color: #fff;
      font-size: 12px; font-weight: 600; padding: 6px 12px;
      border-radius: 8px; white-space: nowrap; z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .guide-fab:hover ~ .guide-fab-label { opacity: 1; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="toeic-onboarding-v2.html" class="navbar-logo">
    <div class="logo-icon">🤖</div>
    <span>TOEIC SmartPrep</span>
  </a>
  <ul class="navbar-nav">
    <li><a href="toeic-onboarding-v2.html">Dashboard</a></li>
    <li><a href="toeic-paper.html">Paper</a></li>
    <li><a href="toeic-performance.html">Performance</a></li>
    <li><a href="toeic-leaderboard.html" class="active">Leaderboard</a></li>
  </ul>
  <div class="navbar-right">
    <div class="credit-badge">🪙 Credit Balance: 10</div>
    <span style="font-size:13px;color:#6B7A99;">EN</span>
    <div class="avatar">👤</div>
  </div>
</nav>

<!-- PAGE -->
<div class="page">
  <h1>Leaderboard</h1>

  <div class="lb-table" id="tour-table">

    <!-- Header -->
    <div class="lb-header">
      <div>Rank</div>
      <div>Learner Name</div>
      <div class="col-streak">Total Streak</div>
      <div class="col-pts" id="tour-pts-col">
        Total Points <span class="info-icon" title="Points earned from quests and completing tests">i</span>
      </div>
    </div>

    <!-- Rows -->
    <div id="lb-rows"></div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="tour-pagination">
    <div class="page-btn arrow">‹ Previous</div>
    <div class="page-btn active">1</div>
    <div class="page-btn">2</div>
    <div class="page-btn">3</div>
    <div class="page-btn arrow">Next ›</div>
  </div>
</div>

<!-- YOUR RANKING -->
<div class="my-ranking" id="tour-my-ranking">
  <div class="my-ranking-inner">
    <div class="my-ranking-label">Your Ranking</div>
    <div class="my-ranking-row">
      <div><div class="rank-badge bronze">#03</div></div>
      <div class="user-info">
        <div class="user-avatar">👤</div>
        <span class="user-name">historia</span>
      </div>
      <div class="col-streak"><span class="streak-val">⚡ 1</span></div>
      <div class="col-pts"><span class="pts-val">🔷 10</span></div>
    </div>
  </div>
</div>

<!-- SPOTLIGHT -->
<div class="spotlight-hole" id="spotlight-hole" style="display:none;"></div>
<div class="spotlight-tooltip" id="spotlight-tooltip" style="display:none;">
  <div class="tooltip-step" id="tt-step"></div>
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-body" id="tt-body"></div>
  <div class="tooltip-actions">
    <div class="tt-dots" id="tt-dots"></div>
    <div class="tooltip-btns">
      <button class="btn-tt-skip" id="btn-tour-skip">End tour</button>
      <button class="btn-tt-next" id="btn-tour-next">Next →</button>
    </div>
  </div>
</div>
<button class="guide-fab" id="guide-fab">?</button>
<div class="guide-fab-label">Take a tour</div>

<script>
  /* ── LEADERBOARD DATA ── */
  const entries = [
    { rank: 1,  name: 'Q*',            streak: 1, pts: 545, avatar: '👤', mine: false },
    { rank: 2,  name: 'B***',          streak: 3, pts: 380, avatar: '👤', mine: false },
    { rank: 3,  name: 'historia',      streak: 1, pts: 10,  avatar: '👤', mine: true  },
    { rank: 4,  name: 'M** G**',       streak: 1, pts: 295, avatar: '👤', mine: false },
    { rank: 5,  name: 'h*** s******',  streak: 2, pts: 240, avatar: '👤', mine: false },
    { rank: 6,  name: 'H*** N*****',   streak: 2, pts: 235, avatar: '👤', mine: false },
    { rank: 7,  name: 'T*******',      streak: 1, pts: 215, avatar: '👤', mine: false },
    { rank: 8,  name: 'G** M** O** h***', streak: 3, pts: 145, avatar: '👤', mine: false },
    { rank: 9,  name: 'T*** N*****',   streak: 3, pts: 140, avatar: '👤', mine: false },
    { rank: 10, name: 'd************************', streak: 1, pts: 95, avatar: '👤', mine: false },
    { rank: 11, name: 'b*** s*****',   streak: 1, pts: 90,  avatar: '👤', mine: false },
    { rank: 12, name: 'L****',         streak: 1, pts: 80,  avatar: '👤', mine: false },
    { rank: 13, name: 'S****** T***',  streak: 2, pts: 75,  avatar: '👤', mine: false },
    { rank: 14, name: 'b***',          streak: 2, pts: 70,  avatar: '👤', mine: false },
    { rank: 15, name: 'h**********',   streak: 1, pts: 70,  avatar: '👤', mine: false },
    { rank: 16, name: 'M**** E**********', streak: 2, pts: 55, avatar: '👤', mine: false },
    { rank: 17, name: 'G** M** T*** 3', streak: 2, pts: 55, avatar: '👤', mine: false },
    { rank: 18, name: 'Q****',         streak: 1, pts: 50,  avatar: '👤', mine: false },
    { rank: 19, name: 'A** S*** S*****', streak: 1, pts: 35, avatar: '👤', mine: false },
    { rank: 20, name: 'D**** R*******', streak: 1, pts: 30, avatar: '👤', mine: false },
  ];

  function badgeClass(rank) {
    if (rank === 1) return 'gold';
    if (rank === 2) return 'silver';
    if (rank === 3) return 'bronze';
    return 'plain';
  }

  const rows = document.getElementById('lb-rows');
  rows.innerHTML = entries.map(e => `
    <div class="lb-row ${e.mine ? 'mine' : ''}" ${e.rank === 1 ? 'id="tour-top-row"' : ''}>
      <div><div class="rank-badge ${badgeClass(e.rank)}">#${String(e.rank).padStart(2,'0')}</div></div>
      <div class="user-info">
        <div class="user-avatar">${e.avatar}</div>
        <span class="user-name">${e.name}</span>
      </div>
      <div class="col-streak"><span class="streak-val">⚡ ${e.streak}</span></div>
      <div class="col-pts"><span class="pts-val">🔷 ${e.pts}</span></div>
    </div>
  `).join('');


  /* ── TOUR ── */
  const tourSteps = [
    {
      targetId: 'tour-pts-col',
      title: 'Total Points',
      body: 'Points are earned by completing quests on the Dashboard — like finishing a mock test or using a credit. Check your quests daily to maximise points.',
      position: 'left',
    },
    {
      targetId: 'tour-top-row',
      title: 'Total Streak',
      body: 'Streak counts how many consecutive days you\'ve completed a test. Keep your streak alive to stay competitive on the board.',
      position: 'bottom',
    },
  ];

  const hole = document.getElementById('spotlight-hole');
  const tooltip = document.getElementById('spotlight-tooltip');
  const ttStep = document.getElementById('tt-step');
  const ttTitle = document.getElementById('tt-title');
  const ttBody = document.getElementById('tt-body');
  const ttDots = document.getElementById('tt-dots');
  const btnTourSkip = document.getElementById('btn-tour-skip');
  const btnTourNext = document.getElementById('btn-tour-next');
  let tourIdx = 0;
  let tourActive = false;

  function startTour() {
    tourActive = true;
    tourIdx = 0;
    hole.style.display = 'block';
    tooltip.style.display = 'block';
    renderStep();
  }

  function renderStep() {
    const step = tourSteps[tourIdx];
    ttDots.innerHTML = tourSteps.map((_, i) =>
      `<div class="dot ${i === tourIdx ? 'active' : ''}"></div>`
    ).join('');
    ttStep.textContent = `Step ${tourIdx + 1} of ${tourSteps.length}`;
    ttTitle.textContent = step.title;
    ttBody.textContent = step.body;
    btnTourNext.textContent = tourIdx === tourSteps.length - 1 ? 'Finish ✓' : 'Next →';

    if (!step.targetId) {
      hole.style.opacity = '0';
      tooltip.style.top = '50%';
      tooltip.style.left = '50%';
      tooltip.style.transform = 'translate(-50%, -50%)';
      return;
    }

    const el = document.getElementById(step.targetId);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => {
      const rect = el.getBoundingClientRect();
      const pad = 10;
      hole.style.cssText = `
        display: block; position: fixed; z-index: 101; pointer-events: none;
        top: ${rect.top - pad}px; left: ${rect.left - pad}px;
        width: ${rect.width + pad * 2}px; height: ${rect.height + pad * 2}px;
        border-radius: 14px; opacity: 1;
        box-shadow: 0 0 0 9999px rgba(15,23,42,0.75);
        transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      `;
      positionTooltip(rect, step.position, pad);
    }, 150);
  }

  function positionTooltip(rect, pos, pad) {
    const tw = 310, th = 230, gap = 14;
    tooltip.style.transform = 'none';
    if (pos === 'bottom') {
      tooltip.style.top = (rect.bottom + pad + gap) + 'px';
      tooltip.style.left = Math.min(rect.left, window.innerWidth - tw - 16) + 'px';
    } else if (pos === 'top') {
      tooltip.style.top = Math.max(8, rect.top - pad - th - gap) + 'px';
      tooltip.style.left = Math.min(rect.left, window.innerWidth - tw - 16) + 'px';
    } else if (pos === 'left') {
      tooltip.style.top = Math.min(rect.top, window.innerHeight - th - 16) + 'px';
      tooltip.style.left = Math.max(8, rect.left - tw - gap - pad) + 'px';
    } else {
      tooltip.style.top = '50%'; tooltip.style.left = '50%';
      tooltip.style.transform = 'translate(-50%, -50%)';
    }
  }

  btnTourNext.addEventListener('click', () => {
    if (tourIdx < tourSteps.length - 1) { tourIdx++; renderStep(); }
    else endTour();
  });
  btnTourSkip.addEventListener('click', endTour);

  function endTour() {
    tourActive = false;
    hole.style.display = 'none';
    tooltip.style.display = 'none';
  }

  document.getElementById('guide-fab').addEventListener('click', () => {
    if (!tourActive) startTour();
  });

  setTimeout(startTour, 600);
</script>
</body>
</html>
