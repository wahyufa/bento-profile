<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC SmartPrep — Papers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1A2340;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #E8EDF3;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .navbar-logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 15px; color: #1A2340;
      text-decoration: none;
    }
    .logo-icon {
      width: 38px; height: 38px; background: #17B1EF;
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 18px;
    }
    .navbar-nav { display: flex; gap: 28px; list-style: none; }
    .navbar-nav a {
      text-decoration: none; font-size: 14px;
      color: #6B7A99; font-weight: 500; padding-bottom: 4px;
    }
    .navbar-nav a.active { color: #17B1EF; border-bottom: 2px solid #17B1EF; }
    .navbar-right { display: flex; align-items: center; gap: 16px; }
    .credit-badge {
      background: #FFF8E6; border: 1px solid #FFD966;
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; font-weight: 600; color: #B8860B;
      display: flex; align-items: center; gap: 6px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #E0E7EF; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }

    /* HERO */
    .hero {
      background: #EEF4FB;
      padding: 40px 40px 32px;
    }
    .hero-breadcrumb { font-size: 13px; color: #6B7A99; margin-bottom: 10px; }
    .hero h1 { font-size: 36px; font-weight: 800; color: #1A2340; line-height: 1.2; }

    /* TABS + FILTERS */
    .content-area { padding: 24px 40px; max-width: 1200px; }
    .tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid #E8EDF3;
      margin-bottom: 24px;
    }
    .tab {
      padding: 12px 0; margin-right: 28px;
      font-size: 14px; font-weight: 600; color: #6B7A99;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.2s;
    }
    .tab .badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: #E8EDF3; color: #6B7A99;
      border-radius: 20px; font-size: 11px; font-weight: 700;
      padding: 1px 7px; margin-left: 6px;
    }
    .tab.active { color: #17B1EF; border-bottom-color: #17B1EF; }
    .tab.active .badge { background: #EAF6FE; color: #17B1EF; }

    /* TYPE FILTERS */
    .filters {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .filter-pills { display: flex; gap: 10px; }
    .pill {
      padding: 7px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid #E8EDF3; background: #fff; color: #6B7A99;
      transition: all 0.15s;
    }
    .pill.active { background: #17B1EF; color: #fff; border-color: #17B1EF; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      border: 1.5px solid #E8EDF3; border-radius: 10px;
      padding: 8px 14px; font-size: 13px; color: #6B7A99;
      background: #fff;
    }
    .search-box input {
      border: none; outline: none; font-size: 13px;
      color: #1A2340; width: 160px; background: transparent;
    }
    .search-box input::placeholder { color: #A0AEBE; }

    /* PAPER GRID */
    .papers-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .paper-card {
      border-radius: 16px;
      border: 1.5px solid #E8EDF3;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .paper-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
    .paper-thumb {
      width: 100%; height: 160px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .paper-thumb.lr { background: linear-gradient(135deg, #5BC5F2 0%, #1A90D4 100%); }
    .paper-thumb.lr-dark { background: linear-gradient(135deg, #2D5F8A 0%, #1A3A5C 100%); }
    .paper-thumb.sw { background: linear-gradient(135deg, #6ECFAF 0%, #22937A 100%); }
    .thumb-set-badge {
      position: absolute; bottom: 12px; right: 12px;
      background: #FF8C00; color: #fff;
      font-size: 11px; font-weight: 800;
      padding: 4px 10px; border-radius: 6px; letter-spacing: 0.5px;
    }
    .thumb-type-label {
      font-size: 13px; font-weight: 700; color: #fff;
      text-align: center; line-height: 1.4;
      position: absolute; right: 48px; bottom: 36px;
    }
    .thumb-mascot {
      font-size: 52px; position: absolute; left: 16px; bottom: 0;
    }
    .paper-body { padding: 16px; }
    .paper-body h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .paper-status {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
    }
    .paper-status.attempted { background: #F0F4F8; color: #6B7A99; }
    .paper-status.active { background: #EAFAF1; color: #22937A; }
    .paper-meta { font-size: 12px; color: #6B7A99; line-height: 1.9; margin-bottom: 12px; }
    .enrolled-count { font-size: 12px; color: #6B7A99; margin-bottom: 12px; }
    .paper-btn {
      width: 100%; padding: 11px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: background 0.15s;
    }
    .paper-btn.primary { background: #17B1EF; color: #fff; }
    .paper-btn.primary:hover { background: #0FA3E0; }
    .paper-btn.outline { background: #fff; color: #17B1EF; border: 1.5px solid #17B1EF; }
    .paper-btn.outline:hover { background: #EAF6FE; }

    /* ─── SPOTLIGHT TOUR ─── */
    .spotlight-hole {
      position: fixed;
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.75);
      z-index: 101;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .spotlight-tooltip {
      position: fixed;
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      width: 310px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      z-index: 102;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tooltip-step {
      font-size: 11px; font-weight: 700; color: #17B1EF;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .tooltip-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #1A2340; }
    .tooltip-body { font-size: 13px; color: #6B7A99; line-height: 1.6; margin-bottom: 16px; }
    .tooltip-actions { display: flex; justify-content: space-between; align-items: center; }
    .tt-dots { display: flex; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #D1D9E6; }
    .dot.active { background: #17B1EF; width: 18px; border-radius: 3px; }
    .tooltip-btns { display: flex; gap: 8px; }
    .btn-tt-skip {
      padding: 8px 14px; background: none; border: 1.5px solid #E0E7EF;
      border-radius: 8px; font-size: 13px; font-weight: 600; color: #6B7A99; cursor: pointer;
    }
    .btn-tt-next {
      padding: 8px 18px; background: #17B1EF; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer;
    }
    .guide-fab {
      position: fixed; bottom: 28px; right: 28px;
      width: 52px; height: 52px; border-radius: 50%;
      background: #17B1EF; color: #fff; border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(23,177,239,0.45);
      font-size: 22px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      z-index: 50; transition: transform 0.2s, box-shadow 0.2s;
    }
    .guide-fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(23,177,239,0.55); }
    .guide-fab-label {
      position: fixed; bottom: 34px; right: 92px;
      background: #1A2340; color: #fff;
      font-size: 12px; font-weight: 600; padding: 6px 12px;
      border-radius: 8px; white-space: nowrap; z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .guide-fab:hover ~ .guide-fab-label { opacity: 1; }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 12px;
      text-align: center;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #EAF6FE;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 4px;
    }
    .empty-state h3 { font-size: 16px; font-weight: 700; }
    .empty-state p { font-size: 13px; color: #6B7A99; max-width: 300px; line-height: 1.6; }
    .empty-cta {
      margin-top: 4px; padding: 10px 24px;
      background: #17B1EF; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="toeic-onboarding-v2.html" class="navbar-logo">
    <div class="logo-icon">🤖</div>
    <span>TOEIC SmartPrep</span>
  </a>
  <ul class="navbar-nav">
    <li><a href="toeic-onboarding-v2.html">Dashboard</a></li>
    <li><a href="toeic-paper.html" class="active">Paper</a></li>
    <li><a href="toeic-performance.html">Performance</a></li>
    <li><a href="toeic-leaderboard.html">Leaderboard</a></li>
  </ul>
  <div class="navbar-right">
    <div class="credit-badge">🪙 Credit Balance: 10</div>
    <span style="font-size:13px;color:#6B7A99;">EN</span>
    <div class="avatar">👤</div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-breadcrumb">Papers</div>
  <h1>Explore TOEIC<br>Papers to Boost Your<br>Prep</h1>
</div>

<!-- CONTENT -->
<div class="content-area">

  <!-- TABS -->
  <div class="tabs" id="tour-tabs">
    <div class="tab" id="tab-my" onclick="switchTab('my')">
      My Papers <span class="badge" id="badge-my">0</span>
    </div>
    <div class="tab active" id="tab-available" onclick="switchTab('available')">
      Available Papers <span class="badge" id="badge-available">10</span>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters" id="tour-filters">
    <div class="filter-pills">
      <div class="pill active" onclick="setFilter('all', this)">All Types</div>
      <div class="pill" onclick="setFilter('lr', this)">Listening & Reading</div>
      <div class="pill" onclick="setFilter('sw', this)">Speaking & Writing</div>
    </div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Search for a Paper" id="search-input" oninput="filterCards()" />
    </div>
  </div>

  <!-- PAPER GRID -->
  <div class="papers-grid" id="papers-grid">
    <!-- injected by JS -->
  </div>
</div>

<!-- SPOTLIGHT (must be before script) -->
<div class="spotlight-hole" id="spotlight-hole" style="display:none;"></div>
<div class="spotlight-tooltip" id="spotlight-tooltip" style="display:none;">
  <div class="tooltip-step" id="tt-step"></div>
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-body" id="tt-body"></div>
  <div class="tooltip-actions">
    <div class="tt-dots" id="tt-dots"></div>
    <div class="tooltip-btns">
      <button class="btn-tt-skip" id="btn-tour-skip">End tour</button>
      <button class="btn-tt-next" id="btn-tour-next">Next →</button>
    </div>
  </div>
</div>
<button class="guide-fab" id="guide-fab">?</button>
<div class="guide-fab-label">Take a tour</div>

<script>
  const papers = [
    { id: 1, title: 'TOEIC Listening + Reading SET 1', type: 'lr', difficulty: 'Easy',   mins: 120, qs: 200, set: 'SET 1', thumb: 'lr',      status: null },
    { id: 2, title: 'TOEIC Listening + Reading SET 2', type: 'lr', difficulty: 'Medium',  mins: 120, qs: 200, set: 'SET 2', thumb: 'lr',      status: null },
    { id: 3, title: 'TOEIC Listening + Reading SET 3', type: 'lr', difficulty: 'Medium',  mins: 120, qs: 200, set: 'SET 3', thumb: 'lr-dark', status: null },
    { id: 4, title: 'TOEIC Listening + Reading SET 4', type: 'lr', difficulty: 'Medium',  mins: 120, qs: 200, set: 'SET 4', thumb: 'lr',      status: null },
    { id: 5, title: 'TOEIC Listening + Reading SET 5', type: 'lr', difficulty: 'Hard',    mins: 120, qs: 200, set: 'SET 5', thumb: 'lr-dark', status: null },
    { id: 6, title: 'TOEIC Speaking + Writing SET 1',  type: 'sw', difficulty: 'Easy',   mins: 80,  qs: 19,  set: 'SET 1', thumb: 'sw',      status: null },
    { id: 7, title: 'TOEIC Speaking + Writing SET 2',  type: 'sw', difficulty: 'Medium',  mins: 80,  qs: 19,  set: 'SET 2', thumb: 'sw',      status: null },
    { id: 8, title: 'TOEIC Speaking + Writing SET 3',  type: 'sw', difficulty: 'Medium',  mins: 80,  qs: 19,  set: 'SET 3', thumb: 'sw',      status: null },
    { id: 9, title: 'TOEIC Speaking + Writing SET 4',  type: 'sw', difficulty: 'Hard',    mins: 80,  qs: 19,  set: 'SET 4', thumb: 'sw',      status: null },
    { id:10, title: 'TOEIC Speaking + Writing SET 5',  type: 'sw', difficulty: 'Hard',    mins: 80,  qs: 19,  set: 'SET 5', thumb: 'sw',      status: null },
  ];

  // Simulate enrolled papers (for My Papers tab demo)
  const myPapers = [];

  let activeTab = 'available';
  let activeFilter = 'all';

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-my').classList.toggle('active', tab === 'my');
    document.getElementById('tab-available').classList.toggle('active', tab === 'available');
    renderGrid();
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    renderGrid();
  }

  function filterCards() { renderGrid(); }

  function renderGrid() {
    const grid = document.getElementById('papers-grid');
    const query = document.getElementById('search-input').value.toLowerCase();
    const source = activeTab === 'my' ? myPapers : papers;

    let filtered = source.filter(p => {
      const matchType = activeFilter === 'all' || p.type === activeFilter;
      const matchSearch = p.title.toLowerCase().includes(query);
      return matchType && matchSearch;
    });

    if (filtered.length === 0) {
      if (activeTab === 'my') {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📂</div>
            <h3>No papers enrolled yet</h3>
            <p>You haven't enrolled in any paper yet. Browse available papers and use a credit to get started.</p>
            <button class="empty-cta" onclick="switchTab('available')">Browse Available Papers →</button>
          </div>`;
      } else {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>No papers found</h3>
            <p>Try a different search or filter.</p>
          </div>`;
      }
      return;
    }

    grid.innerHTML = filtered.map(p => cardHTML(p)).join('');
  }

  function cardHTML(p) {
    const typeLabel = p.type === 'lr' ? 'Listening &amp;<br>Reading' : 'Speaking &amp;<br>Writing';
    const btnLabel = activeTab === 'my'
      ? (p.status === 'active' ? 'Continue' : 'View Result')
      : 'Start Test';
    const btnClass = activeTab === 'my' && p.status !== 'active' ? 'outline' : 'primary';
    const statusBadge = activeTab === 'my'
      ? `<div class="paper-status ${p.status === 'active' ? 'active' : 'attempted'}">${p.status === 'active' ? 'Active' : 'Attempted'}</div>`
      : '';

    return `
    <div class="paper-card">
      <div class="paper-thumb ${p.thumb}">
        <span class="thumb-mascot">🤖</span>
        <div class="thumb-type-label">${typeLabel}</div>
        <div class="thumb-set-badge">${p.set}</div>
      </div>
      <div class="paper-body">
        <h4>${p.title}</h4>
        ${statusBadge}
        <div class="paper-meta">
          🕐 ${p.mins} Minutes<br>
          💬 ${p.qs} Questions<br>
          📊 ${p.difficulty}
        </div>
        <a href="toeic-paper-detail.html"><button class="paper-btn ${btnClass}">${btnLabel}</button></a>
      </div>
    </div>`;
  }

  // Init — start on My Papers (first-time user state)
  renderGrid();
  switchTab('my');

  // Add id to first card after render
  function tagFirstCard() {
    const first = document.querySelector('.paper-card');
    if (first) first.id = 'tour-first-card';
    const firstBtn = document.querySelector('.paper-btn');
    if (firstBtn) firstBtn.id = 'tour-start-btn';
  }
  setTimeout(tagFirstCard, 100);

  // Auto-start tour on first visit
  setTimeout(startTour, 600);

  /* ── SPOTLIGHT TOUR ── */
  const tourSteps = [
    {
      targetId: 'tour-tabs',
      title: 'My Papers & Available Papers',
      body: 'My Papers shows tests you\'ve enrolled in. Available Papers lists all tests you can enroll in using your credits.',
      position: 'bottom',
    },
    {
      targetId: 'tour-filters',
      title: 'Filter by Type',
      body: 'Filter papers by Listening & Reading or Speaking & Writing, or search by name to find a specific SET.',
      position: 'bottom',
    },
    {
      targetId: 'tour-first-card',
      title: 'Paper Card',
      body: 'Each card shows the SET name, duration, number of questions, and difficulty level — so you can pick the right one for your prep.',
      position: 'right',
      beforeStep: () => { switchTab('available'); },
    },
    {
      targetId: 'tour-start-btn',
      title: 'Start Test',
      body: 'Clicking here takes you to the paper detail page where you can enroll using 1 credit and unlock all tests in that SET.',
      position: 'top',
    },
  ];

  const hole = document.getElementById('spotlight-hole');
  const tooltip = document.getElementById('spotlight-tooltip');
  const ttStep = document.getElementById('tt-step');
  const ttTitle = document.getElementById('tt-title');
  const ttBody = document.getElementById('tt-body');
  const ttDots = document.getElementById('tt-dots');
  const btnTourSkip = document.getElementById('btn-tour-skip');
  const btnTourNext = document.getElementById('btn-tour-next');
  let tourIdx = 0;
  let tourActive = false;

  function startTour() {
    tagFirstCard();
    tourActive = true;
    tourIdx = 0;
    hole.style.display = 'block';
    tooltip.style.display = 'block';
    renderStep();
  }

  function renderStep() {
    const step = tourSteps[tourIdx];

    // Update tooltip content immediately
    ttDots.innerHTML = tourSteps.map((_, i) =>
      `<div class="dot ${i === tourIdx ? 'active' : ''}"></div>`
    ).join('');
    ttStep.textContent = `Step ${tourIdx + 1} of ${tourSteps.length}`;
    ttTitle.textContent = step.title;
    ttBody.textContent = step.body;
    btnTourNext.textContent = tourIdx === tourSteps.length - 1 ? 'Finish ✓' : 'Next →';

    if (step.beforeStep) {
      // Run tab switch / DOM prep first, then highlight after DOM settles
      step.beforeStep();
      setTimeout(() => highlightElement(step), 350);
    } else {
      highlightElement(step);
    }
  }

  function highlightElement(step) {
    tagFirstCard(); // ensure IDs are stamped on dynamic cards
    const el = document.getElementById(step.targetId);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => {
      const rect = el.getBoundingClientRect();
      const pad = 10;
      hole.style.cssText = `
        display: block; position: fixed; z-index: 101; pointer-events: none;
        top: ${rect.top - pad}px; left: ${rect.left - pad}px;
        width: ${rect.width + pad * 2}px; height: ${rect.height + pad * 2}px;
        border-radius: 14px; opacity: 1;
        box-shadow: 0 0 0 9999px rgba(15,23,42,0.75);
        transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      `;
      positionTooltip(rect, step.position, pad);
    }, 150);
  }

  function positionTooltip(rect, pos, pad) {
    const tw = 310, th = 220, gap = 14;
    tooltip.style.transform = 'none';
    if (pos === 'bottom') {
      tooltip.style.top = (rect.bottom + pad + gap) + 'px';
      tooltip.style.left = Math.min(rect.left, window.innerWidth - tw - 16) + 'px';
    } else if (pos === 'top') {
      tooltip.style.top = Math.max(8, rect.top - pad - th - gap) + 'px';
      tooltip.style.left = Math.min(rect.left, window.innerWidth - tw - 16) + 'px';
    } else if (pos === 'right') {
      tooltip.style.top = Math.min(rect.top, window.innerHeight - th - 16) + 'px';
      tooltip.style.left = (rect.right + pad + gap) + 'px';
    } else {
      tooltip.style.top = '50%'; tooltip.style.left = '50%';
      tooltip.style.transform = 'translate(-50%, -50%)';
    }
  }

  btnTourNext.addEventListener('click', () => {
    if (tourIdx < tourSteps.length - 1) { tourIdx++; renderStep(); }
    else endTour();
  });
  btnTourSkip.addEventListener('click', endTour);

  function endTour() {
    tourActive = false;
    hole.style.display = 'none';
    tooltip.style.display = 'none';
  }

  document.getElementById('guide-fab').addEventListener('click', () => {
    if (!tourActive) startTour();
  });
</script>


</body>
</html>
